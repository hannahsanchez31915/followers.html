<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Follower Goal</title>

<style>

body{
margin:0;
background:transparent;
font-family:"Trebuchet MS", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* GOAL CONTAINER */

.goal-container{

width:420px;
padding:16px;

background:linear-gradient(
180deg,
rgba(255,223,236,0.95),
rgba(255,193,218,0.95)
);

border-radius:22px;
border:2px solid rgba(255,255,255,0.8);

box-shadow:
0 0 18px rgba(255,160,200,0.4);

text-align:center;

}

/* TITLE */

.goal-title{

font-size:20px;
font-weight:900;

color:#ff4f98;

margin-bottom:10px;

}

/* BAR */

.goal-bar{

width:100%;
height:20px;

background:rgba(255,220,235,0.7);

border-radius:20px;

overflow:hidden;

}

/* FILL */

.goal-fill{

height:100%;
width:0%;

background:linear-gradient(
90deg,
#ff7ab6,
#ff4f98
);

transition:width .4s ease;

}

/* TEXT */

.goal-text{

margin-top:8px;

font-weight:900;
font-size:16px;

color:#ff4f98;

}

</style>
</head>

<body>

<div class="goal-container">

<div class="goal-title">
💗 Prxttysiren Follower Goal
</div>

<div class="goal-bar">
<div class="goal-fill" id="goalFill"></div>
</div>

<div class="goal-text">
<span id="current">0</span> / <span id="target">1000</span>
</div>

</div>

<script>

let followerCount = 954
let followerGoal = 1000

const fill = document.getElementById("goalFill")
const current = document.getElementById("current")
const target = document.getElementById("target")

target.innerText = followerGoal

function updateGoal(){

current.innerText = followerCount

let percent = (followerCount / followerGoal) * 100
fill.style.width = percent + "%"

}

updateGoal()

/* TEST FUNCTION */

window.addFollower = function(){

followerCount++
updateGoal()

}

</script>

</body>
</html>
